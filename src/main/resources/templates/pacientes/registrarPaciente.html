<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">

<head>
	<title>Registro de Paciente</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="container mt-4">

	<h2>Datos del Paciente</h2>

	<form th:action="@{/pacientes/guardar}" method="post">

		<div class="mb-3">
			<label>DNI</label>
			<input type="text" name="dni" class="form-control">
		</div>

		<div class="mb-3">
			<label>Nombre</label>
			<input type="text" name="nombre" class="form-control">
		</div>

		<div class="mb-3">
			<label>Apellido Paterno</label>
			<input type="text" name="apePat" class="form-control">
		</div>

		<div class="mb-3">
			<label>Apellido Materno</label>
			<input type="text" name="apeMat" class="form-control">
		</div>

		<div class="mb-3">
			<label>Fecha de Nacimiento</label>
			<input type="date" name="fechaNacimiento" class="form-control">
		</div>

		<div class="mb-3">
			<label>Género</label>
			<select class="form-control">
				<option value="">Seleccione</option>
				<option value="M">Masculino</option>
				<option value="F">Femenino</option>
			</select>
		</div>

		<div class="mb-3">
			<label>Direccion</label>
			<input type="text" name="direccion" class="form-control">
		</div>

		<div class="mb-3">
			<label>Telefono</label>
			<input type="text" name="telefono" class="form-control">
		</div>

		<div class="mb-3">
			<label>Correo</label>
			<input type="text" name="correo" class="form-control">
		</div>

		<div class="mb-3">
			<label>Nombre Completo</label>
			<input type="text" name="cttoEmergencia" class="form-control">
		</div>

		<div class="mb-3">
			<label>Telefono</label>
			<input type="text" name="nroCttoEmergencia" class="form-control">
		</div>
		
		<button type="submit" class="btn btn-primary">Guardar</button>
	</form>
</body>

</html>
